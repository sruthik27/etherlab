---
name: stp-timer-misconfigurations

mgmt:
  network: clab-mgmt-stp-timer-misconfigurations
  ipv4-subnet: 172.30.81.0/24
  ipv6-subnet: 3fff:172:30:81::/64

topology:
  nodes:
    sw1:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw1.cfg
      mgmt-ipv4: 172.30.81.11
      mgmt-ipv6: 3fff:172:30:81::11

    sw2:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw2.cfg
      mgmt-ipv4: 172.30.81.12
      mgmt-ipv6: 3fff:172:30:81::12

    sw3:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw3.cfg
      mgmt-ipv4: 172.30.81.13
      mgmt-ipv6: 3fff:172:30:81::13

    relay:
      kind: linux
      image: nicolaka/netshoot:latest
      mgmt-ipv4: 172.30.81.30
      mgmt-ipv6: 3fff:172:30:81::30
      cmd: sh -c "sleep infinity"

    injector:
      kind: linux
      image: nicolaka/netshoot:latest
      mgmt-ipv4: 172.30.81.40
      mgmt-ipv6: 3fff:172:30:81::40
      cmd: sh -c "sleep infinity"

  links:
    - endpoints: ["sw1:Ethernet0/1", "sw2:Ethernet0/1"]
    - endpoints: ["sw1:Ethernet0/2", "sw3:Ethernet0/1"]
    - endpoints: ["sw2:Ethernet0/2", "sw3:Ethernet0/2"]
    - endpoints: ["sw2:Ethernet0/3", "relay:eth1"]
    - endpoints: ["relay:eth2", "injector:eth1"]
