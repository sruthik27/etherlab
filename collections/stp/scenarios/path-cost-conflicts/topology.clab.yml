---
name: stp-path-cost-conflicts

mgmt:
  network: clab-mgmt-stp-path-cost-conflicts
  ipv4-subnet: 172.30.82.0/24
  ipv6-subnet: 3fff:172:30:82::/64

topology:
  nodes:
    sw1:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw1.cfg
      mgmt-ipv4: 172.30.82.11
      mgmt-ipv6: 3fff:172:30:82::11

    sw2:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw2.cfg
      mgmt-ipv4: 172.30.82.12
      mgmt-ipv6: 3fff:172:30:82::12

    sw3:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw3.cfg
      mgmt-ipv4: 172.30.82.13
      mgmt-ipv6: 3fff:172:30:82::13

    sw4:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw4.cfg
      mgmt-ipv4: 172.30.82.14
      mgmt-ipv6: 3fff:172:30:82::14

  links:
    - endpoints: ["sw1:Ethernet0/1", "sw2:Ethernet0/1"]
    - endpoints: ["sw1:Ethernet0/2", "sw3:Ethernet0/1"]
    - endpoints: ["sw2:Ethernet0/2", "sw4:Ethernet0/1"]
    - endpoints: ["sw3:Ethernet0/2", "sw4:Ethernet0/2"]
