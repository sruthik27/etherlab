---
name: stp-version-mismatch

mgmt:
  network: clab-mgmt-stp-version-mismatch
  ipv4-subnet: 172.30.84.0/24
  ipv6-subnet: 3fff:172:30:84::/64

topology:
  nodes:
    sw1:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw1.cfg
      mgmt-ipv4: 172.30.84.11
      mgmt-ipv6: 3fff:172:30:84::11

    sw2:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw2.cfg
      mgmt-ipv4: 172.30.84.12
      mgmt-ipv6: 3fff:172:30:84::12

    sw3:
      kind: cisco_iol
      image: ${STP_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw3.cfg
      mgmt-ipv4: 172.30.84.13
      mgmt-ipv6: 3fff:172:30:84::13

    fault:
      kind: linux
      image: nicolaka/netshoot:latest
      mgmt-ipv4: 172.30.84.30
      mgmt-ipv6: 3fff:172:30:84::30
      cmd: sh -c "sleep infinity"
      exec:
        - ip link add br0 type bridge
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0

  links:
    - endpoints: ["sw1:Ethernet0/1", "fault:eth1"]
    - endpoints: ["fault:eth2", "sw2:Ethernet0/1"]
    - endpoints: ["sw1:Ethernet0/2", "sw3:Ethernet0/1"]
    - endpoints: ["sw2:Ethernet0/2", "sw3:Ethernet0/2"]
