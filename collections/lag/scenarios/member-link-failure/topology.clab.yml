---
name: lag-member-link-failure

mgmt:
  network: clab-mgmt-lag-member-link-failure
  ipv4-subnet: 172.30.81.0/24
  ipv6-subnet: 3fff:172:30:81::/64

topology:
  nodes:
    sw1:
      kind: cisco_iol
      image: ${LAG_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw1.cfg
      mgmt-ipv4: 172.30.81.11
      mgmt-ipv6: 3fff:172:30:81::11

    sw2:
      kind: cisco_iol
      image: ${LAG_SWITCH_IMAGE:=vrnetlab/cisco_iol:L2-15.1a}
      type: l2
      env:
        IOL_HOSTNAME: gns3-iouvm
      startup-config: startup/sw2.cfg
      mgmt-ipv4: 172.30.81.12
      mgmt-ipv6: 3fff:172:30:81::12

    h1:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.30.81.21
      mgmt-ipv6: 3fff:172:30:81::21
      cmd: ash -c "sleep infinity"
      exec:
        - ip link set eth1 up
        - ip link add link eth1 name eth1.10 type vlan id 10
        - ip link add link eth1 name eth1.20 type vlan id 20
        - ip link set eth1.10 up
        - ip link set eth1.20 up
        - ip addr add 10.10.10.11/24 dev eth1.10
        - ip addr add 10.20.20.11/24 dev eth1.20

    h2:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.30.81.22
      mgmt-ipv6: 3fff:172:30:81::22
      cmd: ash -c "sleep infinity"
      exec:
        - ip link set eth1 up
        - ip link add link eth1 name eth1.10 type vlan id 10
        - ip link add link eth1 name eth1.20 type vlan id 20
        - ip link set eth1.10 up
        - ip link set eth1.20 up
        - ip addr add 10.10.10.12/24 dev eth1.10
        - ip addr add 10.20.20.12/24 dev eth1.20

  links:
    - endpoints: ["sw1:Ethernet0/1", "sw2:Ethernet0/1"]
    - endpoints: ["sw1:Ethernet0/2", "sw2:Ethernet0/2"]
    - endpoints: ["sw1:Ethernet0/3", "h1:eth1"]
    - endpoints: ["sw2:Ethernet0/3", "h2:eth1"]
